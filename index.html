<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="icon" href="images/weather-app-thick-line-filled-dark-colors-icons-for-personal-and-commercial-use-free-vector.jpg">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>    
    <div id="main-app-section">
      <header id="clock-section">
        <div id="time">HH:MM:SS</div>
        <div id="date">MM/DD/YYYY</div>
        <div class="dailyWeather">
          <div id="forecast-bar">Loading 5-day forecast...</div>
        </div>
      </header>

      <main id="widgets">
        <div class="widget" id="weather-widget">Loading Weather...</div>
        <div class="widget" id="ucf-parking-widget">Loading UCF Parking...</div>
        <div class="widget" id="shuttle-routes-widget">Loading Shuttle Route...</div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
