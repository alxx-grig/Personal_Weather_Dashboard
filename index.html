<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="icon" href="images/weather-app-thick-line-filled-dark-colors-icons-for-personal-and-commercial-use-free-vector.jpg">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="dailyWeather">
      <div class="widget" id="forecast-bar">Loading 5-day forecast...</div>
    </div>
    
    <div id="main-app-section">

      <!-- Clock section -->
      <header id="clock-section">
        <div id="time">HH:MM:SS</div>
        <div id="date">MM/DD/YYYY</div>
      </header>

      <!-- Widgets section -->
      <main id="widgets">
        <div class="widget" id="weather-widget" style="font-size: 2rem;">Loading Weather...</div>
        <div class="widget" id="ucf-parking-widget" style="font-size: 2rem;">Loading UCF Parking...</div>
        <div class="widget" id="shuttle-routes-widget" style="font-size: 2rem;">Loading Shuttle Route...</div>
        <div class="widget" id="recommendations-widget" style="font-size: 2rem;">Loading Recommendations...</div>
      </main>

    </div>

    <script src="script.js"></script>
  </body>
</html>
